<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1f18"/>
      <stop offset="100%" stop-color="#0a0c0f"/>
    </radialGradient>
    <radialGradient id="diskGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a2a22"/>
      <stop offset="100%" stop-color="#0d1510"/>
    </radialGradient>
    <radialGradient id="glowCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#00cc66" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="512" cy="512" r="480"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="512" cy="512" r="512" fill="#0a0c0f"/>
  <circle cx="512" cy="512" r="480" fill="url(#bgGrad)"/>

  <!-- Outer ring border -->
  <circle cx="512" cy="512" r="478" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.4"/>
  <circle cx="512" cy="512" r="470" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.15"/>

  <!-- Subtle scanline texture -->
  <g clip-path="url(#circleClip)" opacity="0.04">
    <line x1="32" y1="40"  x2="992" y2="40"  stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="56"  x2="992" y2="56"  stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="72"  x2="992" y2="72"  stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="88"  x2="992" y2="88"  stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="104" x2="992" y2="104" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="120" x2="992" y2="120" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="136" x2="992" y2="136" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="152" x2="992" y2="152" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="168" x2="992" y2="168" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="184" x2="992" y2="184" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="200" x2="992" y2="200" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="216" x2="992" y2="216" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="232" x2="992" y2="232" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="248" x2="992" y2="248" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="264" x2="992" y2="264" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="280" x2="992" y2="280" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="296" x2="992" y2="296" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="312" x2="992" y2="312" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="328" x2="992" y2="328" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="344" x2="992" y2="344" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="360" x2="992" y2="360" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="376" x2="992" y2="376" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="392" x2="992" y2="392" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="408" x2="992" y2="408" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="424" x2="992" y2="424" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="440" x2="992" y2="440" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="456" x2="992" y2="456" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="472" x2="992" y2="472" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="488" x2="992" y2="488" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="504" x2="992" y2="504" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="520" x2="992" y2="520" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="536" x2="992" y2="536" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="552" x2="992" y2="552" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="568" x2="992" y2="568" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="584" x2="992" y2="584" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="600" x2="992" y2="600" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="616" x2="992" y2="616" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="632" x2="992" y2="632" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="648" x2="992" y2="648" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="664" x2="992" y2="664" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="680" x2="992" y2="680" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="696" x2="992" y2="696" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="712" x2="992" y2="712" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="728" x2="992" y2="728" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="744" x2="992" y2="744" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="760" x2="992" y2="760" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="776" x2="992" y2="776" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="792" x2="992" y2="792" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="808" x2="992" y2="808" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="824" x2="992" y2="824" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="840" x2="992" y2="840" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="856" x2="992" y2="856" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="872" x2="992" y2="872" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="888" x2="992" y2="888" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="904" x2="992" y2="904" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="920" x2="992" y2="920" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="936" x2="992" y2="936" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="952" x2="992" y2="952" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="968" x2="992" y2="968" stroke="#00ff88" stroke-width="1"/>
    <line x1="32" y1="984" x2="992" y2="984" stroke="#00ff88" stroke-width="1"/>
  </g>

  <!-- HDD platter — outer body -->
  <ellipse cx="512" cy="500" rx="320" ry="310" fill="url(#diskGrad)" stroke="#00ff88" stroke-width="2" opacity="1" filter="url(#glow)"/>

  <!-- Platter rings -->
  <ellipse cx="512" cy="500" rx="290" ry="280" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="512" cy="500" rx="240" ry="230" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="512" cy="500" rx="185" ry="178" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="512" cy="500" rx="130" ry="125" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.2"/>

  <!-- Arm shadow -->
  <rect x="490" y="230" width="18" height="310" rx="9"
    fill="#00ff88" opacity="0.07" transform="rotate(-28 512 500)"/>

  <!-- Read/write arm -->
  <rect x="497" y="235" width="10" height="300" rx="5"
    fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.7"
    transform="rotate(-28 512 500)" filter="url(#innerglow)"/>

  <!-- Arm tip glow dot -->
  <circle cx="620" cy="330" r="10" fill="#00ff88" opacity="0.9" filter="url(#softglow)"/>
  <circle cx="620" cy="330" r="5"  fill="#00ff88" opacity="1"/>

  <!-- Arm pivot -->
  <circle cx="512" cy="500" r="36" fill="#0a1510" stroke="#00ff88" stroke-width="1.5" opacity="0.9"/>
  <circle cx="512" cy="500" r="24" fill="#0f1f18" stroke="#00ff88" stroke-width="1" opacity="0.7"/>

  <!-- Center spindle glow -->
  <circle cx="512" cy="500" r="18" fill="url(#glowCore)" filter="url(#softglow)"/>
  <circle cx="512" cy="500" r="10" fill="#00ff88" opacity="1" filter="url(#glow)"/>
  <circle cx="512" cy="500" r="5"  fill="#ffffff" opacity="0.9"/>

  <!-- Corner bracket accents — top left -->
  <polyline points="180,185 140,185 140,225" fill="none" stroke="#00ff88" stroke-width="2.5" opacity="0.6"/>
  <!-- top right -->
  <polyline points="844,185 884,185 884,225" fill="none" stroke="#00ff88" stroke-width="2.5" opacity="0.6"/>
  <!-- bottom left -->
  <polyline points="180,839 140,839 140,799" fill="none" stroke="#00ff88" stroke-width="2.5" opacity="0.6"/>
  <!-- bottom right -->
  <polyline points="844,839 884,839 884,799" fill="none" stroke="#00ff88" stroke-width="2.5" opacity="0.6"/>

  <!-- App name — DISKCTL -->
  <text
    x="512" y="760"
    font-family="'Courier New', Courier, monospace"
    font-size="88"
    font-weight="900"
    letter-spacing="18"
    fill="#00ff88"
    text-anchor="middle"
    filter="url(#glow)"
    opacity="0.95">DISKCTL</text>

  <!-- Tagline -->
  <text
    x="512" y="820"
    font-family="'Courier New', Courier, monospace"
    font-size="26"
    font-weight="400"
    letter-spacing="10"
    fill="#00ff88"
    text-anchor="middle"
    opacity="0.35">PARTITION CONTROLLER</text>

  <!-- Outer ring glow overlay -->
  <circle cx="512" cy="512" r="478" fill="none" stroke="#00ff88" stroke-width="6" opacity="0.08" filter="url(#softglow)"/>
</svg>
